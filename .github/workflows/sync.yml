name: Sync Walking Data

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Sync Be Well data and push dashboard
        env:
          BEWELL_USERNAME: ${{ secrets.BEWELL_USERNAME }}
          BEWELL_PASSWORD: ${{ secrets.BEWELL_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: psccwc2026/PSCC-walking-challenge-2026
        run: python sync_walking_data.py
